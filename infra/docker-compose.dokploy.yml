services:
  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment:
      PORT: "4000"
      DATA_DIR: /app/apps/backend/data
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD}
    volumes:
      - backend-data:/app/apps/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/rpc}
        VITE_IBAN: ${VITE_IBAN}
        VITE_IBAN_NAME: ${VITE_IBAN_NAME}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/index.html"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  backend-data:
