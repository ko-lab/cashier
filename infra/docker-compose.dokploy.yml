services:
  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment:
      PORT: "4000"
      DATA_DIR: /app/apps/backend/data
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD}
    volumes:
      - backend-data:/app/apps/backend/data
    expose:
      - "4000"
    restart: unless-stopped
    networks:
      - dokploy-network

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/rpc}
        VITE_IBAN: ${VITE_IBAN}
        VITE_IBAN_NAME: ${VITE_IBAN_NAME}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-dev}
    expose:
      - "4173"
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  backend-data:

networks:
  dokploy-network:
    external: true
