services:
  backend:
    build:
      context: ..
      dockerfile: infra/runtime.Dockerfile
    environment:
      APP_ROLE: backend
      PORT: "4000"
      DATA_DIR: /workspace/apps/backend/data
      CATALOG_DIR: /workspace/apps/backend/catalog
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD}
    volumes:
      - ..:/workspace
      - pnpm-store:/pnpm/store
      - backend-data:/workspace/apps/backend/data
    expose:
      - "4000"
    restart: unless-stopped
    networks:
      - dokploy-network

  frontend:
    build:
      context: ..
      dockerfile: infra/runtime.Dockerfile
    environment:
      APP_ROLE: frontend
      VITE_API_URL: ${VITE_API_URL:-/rpc}
      VITE_IBAN: ${VITE_IBAN}
      VITE_IBAN_NAME: ${VITE_IBAN_NAME}
      VITE_APP_VERSION: ${VITE_APP_VERSION:-${COMMIT_SHA:-dev}}
    volumes:
      - ..:/workspace
      - pnpm-store:/pnpm/store
    expose:
      - "4173"
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  backend-data:
  pnpm-store:

networks:
  dokploy-network:
    external: true
