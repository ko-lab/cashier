services:
  backend:
    image: node:24-bookworm-slim
    working_dir: /workspace
    entrypoint: ["/bin/bash", "-lc"]
    command: >-
      corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @spacier/backend start
    env-file: ../apps/backend/.env
    environment:
      PORT: "4000"
      DATA_DIR: /workspace/apps/backend/data
      CATALOG_DIR: /workspace/apps/backend/catalog
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD}
    volumes:
      - ..:/workspace
      - pnpm-store:/pnpm/store
      - backend-data:/workspace/apps/backend/data
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    image: node:24-bookworm-slim
    working_dir: /workspace
    entrypoint: ["/bin/bash", "-lc"]
    command: >-
      corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile &&
      export VITE_API_URL="${VITE_API_URL:-http://localhost:4000/rpc}" &&
      export VITE_IBAN="${VITE_IBAN}" &&
      export VITE_IBAN_NAME="${VITE_IBAN_NAME}" &&
      export VITE_APP_VERSION="${VITE_APP_VERSION:-${COMMIT_SHA:-dev}}" &&
      pnpm --filter @spacier/frontend build &&
      pnpm --filter @spacier/frontend start --host 0.0.0.0 --port 4173
    depends_on:
      - backend
    volumes:
      - ..:/workspace
      - pnpm-store:/pnpm/store
    ports:
      - "4173:4173"
    restart: unless-stopped

volumes:
  backend-data:
  pnpm-store:
