<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="app-commit" content="%VITE_APP_VERSION%" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>KO-LAB KASSA</title>
    <script>
      (function () {
        // iOS 10 Safari can miss this global, but some bundled code references it.
        if (typeof window.TransformStream === "undefined") {
          window.TransformStream = function TransformStream() {
            this.readable = {};
            this.writable = {};
          };
        }
      })();
      window.goFullscreen = function goFullscreen(){
          const elem = document.documentElement;
          if (elem.requestFullscreen) {
              elem.requestFullscreen();
          } else if (elem.webkitRequestFullscreen) { /* Safari */
              elem.webkitRequestFullscreen();
          } else if (elem.msRequestFullscreen) { /* IE11 */
              elem.msRequestFullscreen();
          }
          document.getElementById('fullscreenbutton').remove()
      }
      

    </script>
    <style>
      #fullscreenbutton {
        position: fixed;
        right: 14px;
        bottom: 14px;
        z-index: 1000;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(15, 23, 42, 0.2);
        border-radius: 999px;
        padding: 10px 14px;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: #fff;
        font: 600 14px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        box-shadow: 0 8px 20px rgba(2, 6, 23, 0.25);
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      }

      #fullscreenbutton:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
        box-shadow: 0 10px 24px rgba(2, 6, 23, 0.32);
      }

      #fullscreenbutton:active {
        transform: translateY(0);
        filter: brightness(0.98);
      }
    </style>
  </head>
  <body class="bg-base-light text-slate-900 dark:bg-base-dark dark:text-slate-100">
    <script nomodule>
      (function () {
        var originalImport = window.System && window.System.import;
        var queued = [];
        var polyfillRequested = false;

        function queueImport(src) {
          queued.push(src);
        }

        if (!window.System) {
          window.System = { import: queueImport };
        } else if (!window.System.import) {
          window.System.import = queueImport;
        }

        function flushLegacyQueue() {
          var hasRealSystem =
            window.System &&
            typeof window.System.import === "function" &&
            window.System.import !== queueImport;

          if (!hasRealSystem) {
            if (!polyfillRequested) {
              var polyfill = document.getElementById("vite-legacy-polyfill");
              if (polyfill && polyfill.src) {
                polyfillRequested = true;
                var loader = document.createElement("script");
                loader.src = polyfill.src;
                loader.onload = flushLegacyQueue;
                document.body.appendChild(loader);
              }
            }
            return;
          }

          while (queued.length > 0) {
            window.System.import(queued.shift());
          }
        }

        if (originalImport && originalImport !== queueImport) {
          flushLegacyQueue();
        } else {
          setTimeout(flushLegacyQueue, 0);
        }

      })();
    </script>
    <button id="fullscreenbutton" onclick="window.goFullscreen()" aria-label="Enter fullscreen mode">
      <span aria-hidden="true">⛶</span>
      <span>Fullscreen</span>
    </button>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
