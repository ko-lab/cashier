name: Trigger Dokploy Webhook

on:
  push:
    branches:
      - try2
  workflow_dispatch:

jobs:
  trigger-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy deploy webhook
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$DOKPLOY_WEBHOOK_URL" ]; then
            echo "Missing required secret: DOKPLOY_WEBHOOK_URL"
            exit 1
          fi

          payload=$(cat <<EOF
          {
            "branch": "${BRANCH_NAME}",
            "ref": "refs/heads/${BRANCH_NAME}",
            "sha": "${COMMIT_SHA}",
            "repository": "${REPOSITORY}"
          }
          EOF
          )

          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            --data "$payload" \
            "$DOKPLOY_WEBHOOK_URL"

          echo "Dokploy webhook triggered successfully for branch ${BRANCH_NAME}."
