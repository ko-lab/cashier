name: PR Tests

on:
  pull_request:
    branches:
      - try2
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Test, build and Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run workspace build
        run: pnpm build

      - name: Build backend Docker image
        run: docker build -f infra/backend.Dockerfile -t cashier-backend:pr .

      - name: Build frontend Docker image
        run: docker build \
          -f infra/frontend.Dockerfile \
          --build-arg VITE_API_URL=/rpc \
          --build-arg VITE_IBAN=BE00000000000000 \
          --build-arg VITE_IBAN_NAME=KO-LAB \
          --build-arg VITE_APP_VERSION=pr-${{ github.event.pull_request.number || 'manual' }} \
          -t cashier-frontend:pr .
