name: PR Tests

on:
  pull_request:
    branches:
      - try2
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build:
    name: Workspace build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace build
        run: pnpm build

  docker-backend:
    name: Docker build (backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -f infra/backend.Dockerfile -t cashier-backend:pr .

  docker-frontend:
    name: Docker build (frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -f infra/frontend.Dockerfile --build-arg VITE_API_URL=/rpc --build-arg VITE_IBAN=BE00000000000000 --build-arg VITE_IBAN_NAME=KO-LAB --build-arg VITE_APP_VERSION=pr-${{ github.event.pull_request.number || 'manual' }} -t cashier-frontend:pr .
